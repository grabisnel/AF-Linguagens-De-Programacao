<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livraria Reverie — Contato</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg">
            <!-- só usa o comportamento de collapse do bs em telas com o breakpoint não lg-->

            <div class="container">
                <a class="navbar-brand" a href="index.html"> <!-- tag de logo do bs --> Reverie</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <!-- Container do bootstrap que colapsa e retraí para telas mobile-->
                    <ul class="navbar-nav ms-auto align-items-lg-center gap-2">

                        <li class="nav-item">
                            <a class="nav-link active" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="galeria.html">Galeria</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="contato.html">Contato</a>
                        </li>
                        <li class="nav-item">
                            <button id="button-tema">Escuro</button>
                        </li>

                    </ul>
                </div>

            </div>
        </nav>
    </header>

    <main>
        <section class="secao-contato py-5">
            <div class="container">

                <h1 class="titulo-secao mb-4">Contato</h1>

                <div class="row g-5 mb-5">

                    <div class="col-lg-12">
                        <form id="form-contato" action="#" method="POST">

                            <div class="mb-3">
                                <label for="nome" class="form-label">Nome</label>
                                <input type="text" class="form-control" id="nome" placeholder="Seu nome" required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">E-mail</label>
                                <input type="email" class="form-control" id="email" placeholder="seu@email.com"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label for="assunto" class="form-label">Assunto</label>
                                <input type="text" class="form-control" id="assunto" placeholder="Assunto da mensagem">
                            </div>

                            <div class="mb-3">
                                <label for="mensagem" class="form-label">Mensagem</label>
                                <textarea class="form-control" id="mensagem" rows="5"
                                    placeholder="Escreva sua mensagem..."></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary">Enviar mensagem</button>

                            <div id="feedback" class="feedback-msg"></div>

                        </form>
                    </div>

                </div>

                <div class="container">

                    <div class="row g-5 mb-5">

                        <div class="col-lg-4">
                            <h2 class="titulo-secao mb-5">Onde estamos</h2>
                            <p>Rua das Letras, 42 — Centro</p>
                            <p>Sorocaba, SP — CEP 18010-000</p>
                            <p>(15) 3333-4242</p>
                            <p>contato@livraria-reverie.com.br</p>
                        </div>

                        <div class="col-lg-8">
                            <iframe
                                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3656.4!2d-47.45709!3d-23.50413!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94c588b7e4f4f58f%3A0x8a8c4e50f99f1e5b!2sSorocaba%2C%20SP!5e0!3m2!1spt-BR!2sbr!4v1719000000000!5m2!1spt-BR!2sbr"
                                width="100%" height="220" style="border:0;" loading="lazy">
                            </iframe>
                        </div>

                    </div>

                </div>

                <div class="redes-sociais">
                    <p class="mb-5"><strong>Redes sociais</strong></p>
                    <div class="social-links">
                        <a href="https://www.instagram.com/">Instagram</a>
                        <a href="https://www.facebook.com/">Facebook</a>
                    </div>
                </div>

            </div>

        </section>
    </main>

    <footer>
        <div class="container"> <!-- container padrão do bs -->
            <div class="footer-inner">
                <span><strong>Livraria Reverie</strong></span>
                <small>Gabriel Nunes (RA: 210201) Maria Eduarda Fernandes (RA: 251318)</small>
            </div>
        </div>
    </footer>

    <button id="button-topo" title="Voltar ao topo">Voltar ao topo</button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/tema.js"></script>
    <script src="js/topo.js"></script>
    <script src="js/contato.js"></script>
</body>

</html>
